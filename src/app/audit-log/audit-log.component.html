<div class="bg-white rounded-lg shadow-md overflow-hidden border border-gray-200">
  <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center gap-2">
    <mat-icon class="text-gray-500">history</mat-icon>
    <h3 class="text-lg font-semibold text-gray-800 m-0">Audit Log</h3>
  </div>
  <div class="divide-y divide-gray-100 max-h-96 overflow-y-auto">
    @for (entry of entries().slice().reverse(); track entry.id) {
      <div class="flex items-center gap-4 px-4 py-3 hover:bg-gray-50 transition-colors">
        <div class="shrink-0 w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
          <mat-icon class="text-blue-600 size-5 text-[20px] leading-5 h-5 w-5">
            {{ entry.action === 'save' ? 'save' : 'send' }}
          </mat-icon>
        </div>
        <div class="grow">
          <div class="flex justify-between items-start">
            <span class="font-medium text-gray-900 capitalize">{{ entry.action }} operation</span>
            <span class="text-xs text-gray-500 font-mono">{{ entry.timestamp | date:'MMM d, HH:mm:ss' }}</span>
          </div>
          <div class="text-sm text-gray-600 flex items-center gap-1">
            <mat-icon class="size-3.5 text-[14px] leading-3.5 h-3.5 w-3.5">person</mat-icon>
            {{ entry.userName }}
          </div>
        </div>
      </div>
    } @empty {
      <div class="px-4 py-8 text-center text-gray-400 italic">
        No activity recorded yet.
      </div>
    }
  </div>
</div>
